<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mijn portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" defer></script>
<link rel="stylesheet" href="./css/site.css"/>
<script src="./Javascript/script.js?v=3" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

  <!--Loading screen-->
  <div id="loading-screen">
    <div id="loader-lottie" aria-hidden="true"></div>
  </div>

  <!-- HEADER -->
  <section id="home" class="hero" aria-label="start">
    <!-- SCENE -->
    <div class="scene" id="hero" aria-label="Interactieve bureauscene">
      <picture>
        <source media="(min-width: 1921px)" srcset="./images/desk_03_1920_big.png"/>
        <source media="(max-width: 844px)" srcset="./images/desk_mobile%20version.png"/>
        <img class="scene__img" src="./images/desk_empty.webp" alt="Bureau van bovenaf" />
      </picture>

      <figure
        class="scene-home-animation"
        data-scene-home-animation
        data-frame-ms="180"
        aria-hidden="true"
      >
        <img
          class="scene-home-animation__coffee"
          src="./images/koffie%201.webp"
          alt=""
          data-scene-home-frame
        />
      </figure>

      <figure
        class="scene-about-animation"
        data-scene-about-animation
        data-frame-ms="170"
        aria-hidden="true"
      >
        <img
          class="scene-about-animation__hands"
          src="./images/hand 1.webp"
          alt=""
          data-scene-about-frame
        />
        <img
          class="scene-about-animation__sleeve"
          src="./images/Mouw.webp"
          alt=""
        />
      </figure>

      <!-- SCENE MAP / HOTSPOTS (DESKTOP) -->
      <svg class="scene__map scene__map--desktop" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYmid slice">
        <defs>
          <radialGradient id="aura-desktop" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="rgba(255,140,200,0.55)"/>
            <stop offset="50%" stop-color="rgba(120,180,255,0.35)"/>
            <stop offset="100%" stop-color="rgba(255,220,140,0.0)"/>
          </radialGradient>
        </defs>

        <!-- Home -->
        <a class="hotspot hotspot--desktop" href="#home" data-label="Welkom" data-title="Welkom" data-modal="home">
          <circle cx="1020" cy="270" r="210"></circle>
        </a>

        <!-- About -->
        <a class="hotspot hotspot--desktop" href="#about" data-label="Over mij" data-title="Over mij" data-modal="about">
          <circle cx="660" cy="600" r="300"></circle>
        </a>

        <!-- CV -->
        <a class="hotspot hotspot--desktop" href="#cv" data-label="CV" data-title="CV" data-modal="cv">
          <circle cx="1600" cy="600" r="280"></circle>
        </a>

        <!-- Work -->
        <a class="hotspot hotspot--desktop" href="#work" data-label="Werk" data-title="Werk" data-modal="work">
          <circle cx="270" cy="250" r="250"></circle>
        </a>
      </svg>

      <!-- MOBILE CTA (OVER IMAGE) -->
      <nav class="mobile-cta" aria-label="Snelle navigatie">
        <p class="mobile-cta__hint">Tik voor meer info</p>
        <div class="mobile-cta__row">
          <button class="mobile-cta__btn" type="button" data-modal="about" data-title="Over mij">Over mij</button>
          <button class="mobile-cta__btn" type="button" data-modal="cv" data-title="CV">CV</button>
          <button class="mobile-cta__btn" type="button" data-modal="work" data-title="Werk">Werk</button>
        </div>
      </nav>

      <!-- CURSOR EFFECT -->
<div class="cursor" aria-hidden="true">
  <div class="cursor__outer"></div>
  <div class="cursor__inner"></div>
  <div class="cursor__label"></div>
</div>
</div>
  </section>

  <!-- POP-UPS -->
  <div class="popup" id="popup" hidden>
    <div class="popup__backdrop" data-close-popup></div>
    <div class="popup__card" role="dialog" aria-modal="true" aria-label="Popup">
      <button class="popup__close" type="button" data-close-popup aria-label="Sluit popup">Sluiten</button>
      <div id="popup-content" class="popup__content"></div>
    </div>
  </div>

</body>
</html>
