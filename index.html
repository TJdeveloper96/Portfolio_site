<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My portfolio site</title>
  <link rel="stylesheet" href="./css/site.css" />
  <script src="./Javascript/script.js" defer></script>
</head>

<body>
  <!-- HEADER -->
  <section id="home" class="hero" aria-label="Home">
    <!-- SCENE -->
    <div class="scene" id="hero" aria-label="Interactive desk scene">
      <picture>
        <source media="(max-width: 1024px)" srcset="./images/desk_empty.webp"/>
        <img class="scene__img" src="./images/desk_empty.webp" alt="Desk flatlay" />
      </picture>

      <figure
        class="scene-about-animation"
        data-scene-about-animation
        data-frame-ms="170"
        aria-hidden="true"
      >
        <img
          class="scene-about-animation__hands"
          src="./images/hand 1.webp"
          alt=""
          data-scene-about-frame
        />
        <img
          class="scene-about-animation__sleeve"
          src="./images/Mouw.webp"
          alt=""
        />
      </figure>

      <!-- SCENE MAP / HOTSPOTS (DESKTOP) -->
      <svg class="scene__map scene__map--desktop" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYmid slice">
        <defs>
          <radialGradient id="aura-desktop" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="rgba(255,140,200,0.55)"/>
            <stop offset="50%" stop-color="rgba(120,180,255,0.35)"/>
            <stop offset="100%" stop-color="rgba(255,220,140,0.0)"/>
          </radialGradient>
        </defs>

        <!-- Home -->
        <a class="hotspot hotspot--desktop" href="#home" data-label="Good morning" data-title="Good morning" data-modal="home">
          <circle cx="1020" cy="270" r="210"></circle>
        </a>

        <!-- About -->
        <a class="hotspot hotspot--desktop" href="#about" data-label="About me" data-title="About me" data-modal="about">
          <circle cx="660" cy="600" r="240"></circle>
        </a>

        <!-- CV -->
        <a class="hotspot hotspot--desktop" href="#cv" data-label="CV" data-title="CV" data-modal="cv">
          <circle cx="1600" cy="600" r="280"></circle>
        </a>

        <!-- Work -->
        <a class="hotspot hotspot--desktop" href="#work" data-label="Work" data-title="Work" data-modal="work">
          <circle cx="250" cy="220" r="220"></circle>
        </a>
      </svg>

      <!-- MOBILE CTA (OVER IMAGE) -->
      <nav class="mobile-cta" aria-label="Snelle navigatie">
        <p class="mobile-cta__hint">Tik voor meer info</p>
        <div class="mobile-cta__row">
          <button class="mobile-cta__btn" type="button" data-modal="about" data-title="About me">About</button>
          <button class="mobile-cta__btn" type="button" data-modal="cv" data-title="CV">CV</button>
          <button class="mobile-cta__btn" type="button" data-modal="work" data-title="Work">Work</button>
        </div>
      </nav>

      <!-- CURSOR EFFECT -->
<div class="cursor" aria-hidden="true">
  <div class="cursor__outer"></div>
  <div class="cursor__inner"></div>
  <div class="cursor__label"></div>
</div>
</div>
  </section>

  <!-- POP-UPS -->
  <div class="popup" id="popup" hidden>
    <div class="popup__backdrop" data-close-popup></div>
    <div class="popup__card" role="dialog" aria-modal="true" aria-labelledby="popup-title">
      <button class="popup__close" type="button" data-close-popup aria-label="Close popup">Close</button>
      <h2 id="popup-title"></h2>
      <div id="popup-content" class="popup__content"></div>
    </div>
  </div>

</body>
</html>
